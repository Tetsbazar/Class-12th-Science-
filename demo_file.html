<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemistry Quiz: Liquid State of Matter - Test Bazar</title>
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1a7a4a; --green-light:#2aad68; --green-pale:#e8f7ef;
  --saffron:#e8730a; --saffron-pale:#faeeda;
  --dark:#0f1a14; --text:#1c2e24; --muted:#5a7a66;
  --border:#c5dccb; --white:#f8fdf9;
  --danger:#dc3545; --danger-pale:#fdf0f0;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--white);color:var(--text);line-height:1.6;min-height:100vh}
.bn{font-family:'Tiro Bangla',serif}

.quiz-header{background:linear-gradient(135deg,var(--green) 0%,var(--green-light) 100%);color:white;padding:1.5rem 2rem;box-shadow:0 4px 15px rgba(26,122,74,0.2)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.logo{font-size:1.5rem;font-weight:800}.logo span{color:var(--saffron)}
.quiz-info{text-align:right}
.quiz-title{font-family:'Tiro Bangla',serif;font-size:1.3rem;font-weight:700}
.quiz-subtitle{font-size:0.85rem;opacity:0.9}
.timer-box{background:rgba(255,255,255,0.15);padding:0.5rem 1rem;border-radius:8px;font-weight:700;font-size:1.1rem;backdrop-filter:blur(10px)}

.quiz-container{max-width:1200px;margin:2rem auto;padding:0 1.5rem;display:grid;grid-template-columns:1fr 280px;gap:1.5rem}

.question-area{background:white;border-radius:16px;padding:2rem;box-shadow:0 4px 20px rgba(0,0,0,0.05);border:1px solid var(--border)}
.question-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid var(--green-pale)}
.question-num{font-family:'Tiro Bangla',serif;font-size:1.1rem;font-weight:700;color:var(--green)}
.question-num span{background:var(--green);color:white;padding:0.3rem 0.8rem;border-radius:20px;font-size:0.9rem;margin-right:0.5rem}
.question-mark{font-size:0.85rem;color:var(--muted);font-weight:600}

.question-text{font-family:'Tiro Bangla',serif;font-size:1.1rem;color:var(--dark);margin-bottom:1.5rem;line-height:1.8;padding:1rem;background:var(--green-pale);border-radius:10px;border-left:4px solid var(--green)}

.options-list{display:flex;flex-direction:column;gap:0.8rem;margin-bottom:1.5rem}
.option{display:flex;align-items:center;gap:1rem;padding:1rem 1.2rem;border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:all 0.2s;background:white}
.option:hover{border-color:var(--green);background:var(--green-pale);transform:translateX(4px)}
.option.selected{border-color:var(--green);background:var(--green-pale)}
.option.correct{border-color:var(--green);background:var(--green-pale);border-width:2px}
.option.wrong{border-color:var(--danger);background:var(--danger-pale)}
.option-letter{width:36px;height:36px;border-radius:50%;background:var(--green-pale);color:var(--green);display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;transition:all 0.2s}
.option.selected .option-letter, .option.correct .option-letter{background:var(--green);color:white}
.option.wrong .option-letter{background:var(--danger);color:white}
.option-text{font-family:'Tiro Bangla',serif;font-size:1rem;color:var(--text);flex-grow:1}

.explanation{background:var(--saffron-pale);border-left:4px solid var(--saffron);padding:1rem 1.2rem;border-radius:8px;margin-top:1rem;display:none}
.explanation.show{display:block;animation:fadeIn 0.3s}
.explanation-title{font-family:'Tiro Bangla',serif;font-weight:700;color:var(--saffron);margin-bottom:0.5rem;font-size:1rem}
.explanation-text{font-family:'Tiro Bangla',serif;font-size:0.95rem;color:#633806;line-height:1.7}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

.nav-buttons{display:flex;justify-content:space-between;gap:1rem;margin-top:1.5rem;flex-wrap:wrap}
.btn{padding:0.8rem 1.5rem;border-radius:8px;font-family:'Tiro Bangla',serif;font-size:1rem;font-weight:700;cursor:pointer;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:0.5rem}
.btn-primary{background:var(--green);color:white}
.btn-primary:hover{background:var(--green-light);transform:translateY(-2px)}
.btn-secondary{background:white;color:var(--green);border:2px solid var(--green)}
.btn-secondary:hover{background:var(--green-pale)}
.btn-danger{background:var(--danger);color:white}
.btn-danger:hover{background:#c82333}
.btn:disabled{opacity:0.5;cursor:not-allowed}

.sidebar{display:flex;flex-direction:column;gap:1.5rem}
.sidebar-card{background:white;border-radius:16px;padding:1.5rem;box-shadow:0 4px 20px rgba(0,0,0,0.05);border:1px solid var(--border)}
.sidebar-title{font-family:'Tiro Bangla',serif;font-size:1.1rem;font-weight:700;color:var(--dark);margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:2px solid var(--green-pale)}
.palette{display:grid;grid-template-columns:repeat(6,1fr);gap:0.5rem}
.palette-item{aspect-ratio:1;border:2px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;transition:all 0.2s;font-size:0.85rem;background:white}
.palette-item:hover{border-color:var(--green)}
.palette-item.current{border-color:var(--saffron);background:var(--saffron-pale);color:var(--saffron)}
.palette-item.answered{background:var(--green);color:white;border-color:var(--green)}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem}
.stat-box{background:var(--green-pale);padding:0.8rem;border-radius:8px;text-align:center}
.stat-num{font-size:1.5rem;font-weight:800;color:var(--green)}
.stat-label{font-family:'Tiro Bangla',serif;font-size:0.8rem;color:var(--muted)}

.result-screen{display:none;text-align:center;padding:3rem 2rem}
.result-screen.show{display:block}
.result-icon{font-size:5rem;margin-bottom:1rem}
.result-title{font-family:'Tiro Bangla',serif;font-size:2rem;font-weight:800;color:var(--green);margin-bottom:1rem}
.result-score{font-size:3rem;font-weight:800;color:var(--dark);margin:1rem 0}
.result-score span{color:var(--muted);font-size:1.5rem}
.result-message{font-family:'Tiro Bangla',serif;font-size:1.1rem;color:var(--muted);margin-bottom:2rem}
.result-details{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;max-width:500px;margin:2rem auto}
.result-detail{background:var(--green-pale);padding:1.5rem;border-radius:12px}
.result-detail-num{font-size:1.8rem;font-weight:800;color:var(--green)}
.result-detail-label{font-family:'Tiro Bangla',serif;font-size:0.85rem;color:var(--muted);margin-top:0.3rem}

@media(max-width:900px){
  .quiz-container{grid-template-columns:1fr}
  .sidebar{order:-1}
  .palette{grid-template-columns:repeat(8,1fr)}
}
@media(max-width:600px){
  .quiz-header{padding:1rem}
  .header-inner{flex-direction:column;text-align:center}
  .quiz-info{text-align:center}
  .question-area{padding:1.2rem}
  .question-text{font-size:1rem;padding:0.8rem}
  .option{padding:0.8rem}
  .palette{grid-template-columns:repeat(6,1fr)}
  .result-details{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header class="quiz-header">
  <div class="header-inner">
    <div class="logo">Test <span>Bazar</span></div>
    <div class="quiz-info">
      <div class="quiz-title">🧪 Chemistry: Liquid State of Matter</div>
      <div class="quiz-subtitle">Class 12 (3rd Sem) Unit 1 · ৯০টি প্রশ্ন</div>
    </div>
    <div class="timer-box" id="timer">⏱️ 00:00</div>
  </div>
</header>

<div class="quiz-container">
  <div>
    <div class="question-area" id="questionArea">
      <div class="question-header">
        <div class="question-num"><span id="qNum">১</span> / ৯০</div>
        <div class="question-mark">Marks: 1 | Negative: 0</div>
      </div>
      <div class="question-text" id="questionText"></div>
      <div class="options-list" id="optionsList"></div>
      <div class="explanation" id="explanation">
        <div class="explanation-title">💡 ব্যাখ্যা:</div>
        <div class="explanation-text" id="explanationText"></div>
      </div>
      <div class="nav-buttons">
        <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">← পূর্ববর্তী</button>
        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">পরবর্তী →</button>
        <button class="btn btn-danger" id="submitBtn" onclick="submitQuiz()" style="display:none">✅ Submit Quiz</button>
      </div>
    </div>

    <div class="result-screen" id="resultScreen">
      <div class="result-icon" id="resultIcon">🎉</div>
      <div class="result-title" id="resultTitle">অভিনন্দন!</div>
      <div class="result-score"><span id="scoreNum">0</span> <span>/ 90</span></div>
      <div class="result-message" id="resultMessage">আপনি ভালো করেছেন!</div>
      <div class="result-details">
        <div class="result-detail"><div class="result-detail-num" id="correctCount">0</div><div class="result-detail-label">✅ সঠিক</div></div>
        <div class="result-detail"><div class="result-detail-num" id="wrongCount">0</div><div class="result-detail-label">❌ ভুল</div></div>
        <div class="result-detail"><div class="result-detail-num" id="timeTaken">00:00</div><div class="result-detail-label">⏱️ সময়</div></div>
      </div>
      <button class="btn btn-primary" onclick="reviewQuiz()" style="margin-top:1rem">📖 উত্তর দেখুন</button>
      <button class="btn btn-secondary" onclick="restartQuiz()" style="margin-top:1rem">🔄 আবার শুরু করুন</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-card">
      <div class="sidebar-title">📊 আপনার অগ্রগতি</div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-num" id="answeredCount">0</div><div class="stat-label">উত্তর দেওয়া</div></div>
        <div class="stat-box"><div class="stat-num" id="remainingCount">90</div><div class="stat-label">বাকি আছে</div></div>
      </div>
    </div>
    <div class="sidebar-card">
      <div class="sidebar-title">🗂️ প্রশ্ন তালিকা</div>
      <div class="palette" id="palette"></div>
      <div style="margin-top:1rem;font-size:0.8rem;color:var(--muted);font-family:'Tiro Bangla',serif">
        <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.3rem"><div style="width:14px;height:14px;background:var(--green);border-radius:3px"></div> উত্তর দেওয়া</div>
        <div style="display:flex;align-items:center;gap:0.5rem"><div style="width:14px;height:14px;background:var(--saffron);border-radius:3px"></div> বর্তমান</div>
      </div>
    </div>
  </div>
</div>

<script>
const quizData = [
  // সেট ১: দ্রবণের প্রাথমিক ধারণা ও গাঢ়ত্ব
  {q:`\\(20 \\text{ g}\\) গ্লুকোজকে কত গ্রাম জলে দ্রবীভূত করলে উৎপন্ন দ্রবণের ওজনগত শতকরা গাঢ়ত্ব (W/W) 10% হবে?`,options:[`\\(100 \\text{ g}\\)`,`\\(150 \\text{ g}\\)`,`\\(180 \\text{ g}\\)`,`\\(210 \\text{ g}\\)`],correct:2,explanation:`যদি জলের পরিমাণ W g হয়, তবে দ্রবণের মোট ভর = \\((W + 20) \\text{ g}\\)। শর্তানুযায়ী, \\(\\frac{20}{W + 20} \\times 100 = 10 \\Rightarrow W + 20 = 200 \\Rightarrow W = 180 \\text{ g}\\)।`},
  {q:`সাধারণ স্যালাইন হল 0.9% (W/V) NaCl-এর জলীয় দ্রবণ। উক্ত স্যালাইনের 300 mL আয়তনে যদি আরও 1.8 g NaCl দ্রবীভূত করা হয়, তবে উৎপন্ন দ্রবণের ওজন-আয়তনগত (W/V) শতকরা গাঢ়ত্ব হবে-`,options:[`1.1%`,`1.5%`,`1.8%`,`2.1%`],correct:1,explanation:`300 mL 0.9% (W/V) NaCl দ্রবণে NaCl-এর পরিমাণ = \\(\\frac{0.9}{100} \\times 300 = 2.7 \\text{ g}\\)। আরও 1.8 g যোগ করার পর মোট NaCl = 2.7 + 1.8 = 4.5 g। উৎপন্ন দ্রবণের শতকরা গাঢ়ত্ব = \\(\\frac{4.5}{300} \\times 100\\% = 1.5\\%\\)।`},
  {q:`\\(50^{\\circ}\\text{C}\\) উয়তায় 250 mL জলে 3.25 g গ্লুকোজ দ্রবীভূত আছে। দ্রবণটির ওজনগত শতকরা গাঢ়ত্ব (W/W) হল (\\(50^{\\circ}\\text{C}\\) উয়তায় জলের ঘনত্ব 0.987 \\(g\\cdot mL^{-1}\\))-`,options:[`1.14%`,`1.30%`,`1.83%`,`2.05%`],correct:1,explanation:`250 mL জলের ভর = \\(250 \\times 0.987 = 246.75 \\text{ g}\\)। দ্রবণের মোট ভর = \\(246.75 + 3.25 = 250 \\text{ g}\\)। ওজনগত শতকরা গাঢ়ত্ব = \\(\\frac{3.25}{250} \\times 100\\% = 1.30\\%\\)।`},
  {q:`200 mL জলে কত পরিমাণ (g এককে) গ্লুকোজ দ্রবীভূত করলে দ্রবণের ওজন-আয়তনগত (W/V) শতকরা গাঢ়ত্ব 0.6% হবে? (জলের ঘনত্ব = 1 \\(g\\cdot mL^{-1}\\))`,options:[`0.83 g`,`1.20 g`,`1.53 g`,`1.63 g`],correct:1,explanation:`200 mL জলের ভর = 200 g। ধরি গ্লুকোজ W g। জলের ঘনত্ব 1 হওয়ায় W/V এবং W/W সমান ধরা যায়। \\(\\frac{W}{W + 200} \\times 100 = 0.6 \\Rightarrow W = 1.2 \\text{ g}\\)।`},
  {q:`\\(20^{\\circ}\\text{C}\\) উয়তায় 49% (W/W) \\(H_2SO_4\\) দ্রবণের আপেক্ষিক গুরুত্ব 1.385। 277 mL 2 N \\(H_2SO_4\\) দ্রবণ প্রস্তুত করতে উক্ত দ্রবণের কত আয়তন (mL এককে) প্রয়োজন?`,options:[`40`,`52`,`56`,`60`],correct:0,explanation:`277 mL 2 N দ্রবণে \\(H_2SO_4\\) প্রয়োজন = \\(\\frac{2 \\times 49}{1000} \\times 277 \\text{ g}\\)। 100 g 49% দ্রবণের আয়তন = \\(\\frac{100}{1.385}\\) mL। প্রয়োজনীয় আয়তন = \\(\\frac{100}{1.385} \\times \\frac{1}{49} \\times \\frac{2 \\times 49 \\times 277}{1000} = 40 \\text{ mL}\\)।`},
  {q:`\\(Na_2CO_3\\)-এর 250 mL 0.5 N জলীয় দ্রবণের ওজন-আয়তনগত (W/V) শতকরা গাঢ়ত্ব হল-`,options:[`1.86%`,`2.65%`,`2.94%`,`3.12%`],correct:1,explanation:`1000 mL 0.5 N দ্রবণে \\(Na_2CO_3\\) আছে 26.5 g। 250 mL এ আছে 6.625 g। W/V গাঢ়ত্ব = \\(\\frac{6.625}{250} \\times 100\\% = 2.65\\%\\)।`},
  {q:`ইথানলের একটি জলীয় দ্রবণের শতকরা গাঢ়ত্ব 23% (V/V) এবং বিশুদ্ধ ইথানলের ঘনত্ব 0.8 \\(g\\cdot mL^{-1}\\)। দ্রবণটির মোলার গাঢ়ত্ব (\\(mol\\cdot L^{-1}\\)) হল-`,options:[`3.2`,`3.5`,`4.0`,`4.2`],correct:2,explanation:`100 mL দ্রবণে ইথানল 23 mL। ভর = \\(23 \\times 0.8 = 18.4 \\text{ g}\\)। মোল = 18.4/46 = 0.4 mol। 1000 mL এ থাকবে 4.0 mol।`},
  {q:`388.9 g জল ও 35.1 g NaCl-এর একটি দ্রবণের ঘনত্ব 1.06 \\(g\\cdot mL^{-1}\\)। ওর মোলার গাঢ়ত্ব কত?`,options:[`1.18`,`1.50`,`1.62`,`1.93`],correct:1,explanation:`দ্রবণের মোট ভর = 424 g। আয়তন = \\(\\frac{424}{1.06} = 400 \\text{ mL}\\)। NaCl-এর মোল = 35.1/58.5 = 0.6 mol। মোলার গাঢ়ত্ব = \\(\\frac{0.6}{400} \\times 1000 = 1.50 \\text{ mol}\\cdot L^{-1}\\)।`},
  {q:`\\(H_2SO_4\\)-এর একটি জলীয় দ্রবণ ওজনগতভাবে (W/W) 40% \\(SO_3\\) ধারণ করে। দ্রবণের ঘনত্ব 1.30 \\(g\\cdot mL^{-1}\\) হলে ওর মোলারিটি কত?`,options:[`5.8`,`6.5`,`7.0`,`7.4`],correct:1,explanation:`100 g দ্রবণের আয়তন = 100/1.3 mL। 40 g \\(SO_3\\) = 0.5 mol \\(SO_3\\), যা থেকে 0.5 mol \\(H_2SO_4\\) উৎপন্ন হয়। মোলারিটি = \\(\\frac{0.5}{100/1.3} \\times 1000 = 6.5 \\text{ mol}\\cdot L^{-1}\\)।`},
  {q:`ইউরিয়ার 20% (W/W) জলীয় দ্রবণের মোলালিটি হল-`,options:[`3.82`,`4.17`,`4.96`,`5.26`],correct:1,explanation:`100 g দ্রবণে ইউরিয়া 20 g (1/3 mol) এবং জল 80 g (0.08 kg)। মোলালিটি = \\(\\frac{1/3}{0.08} = 4.17 \\text{ mol}\\cdot kg^{-1}\\)।`},
  {q:`\\(20^{\\circ}\\text{C}\\) উয়তায় ফর্মিক অ্যাসিডের 5.0 M জলীয় দ্রবণের ঘনত্ব 1.15 \\(g\\cdot mL^{-1}\\)। দ্রবণটির মোলালিটি এবং ওজনগত (W/W) শতকরা গাঢ়ত্ব হল যথাক্রমে-`,options:[`4.82 ও 24%`,`5.43 ও 20%`,`5.91 ও 26%`,`6.07 ও 30%`],correct:1,explanation:`1 L দ্রবণের ভর 1150 g। 5 mol HCOOH = 230 g। জলের ভর = 920 g (0.92 kg)। মোলালিটি = \\(\\frac{5}{0.92} = 5.43\\)। W/W = \\(\\frac{230}{1150} \\times 100\\% = 20\\%\\)।`},

  {q:`\\(80^{\\circ}\\text{C}\\)-এ বিশুদ্ধ A ও B তরলের বাষ্পচাপ যথাক্রমে 520 ও 1000 mm Hg। দ্রবণটি 1 atm (760 mm Hg) চাপে ফুটলে দ্রবণে A-এর শতকরা মোল সংখ্যা কত?`,options:[`45.8%`,`48.2%`,`50.0%`,`52.6%`],correct:2,explanation:`রাউল্টের সূত্র অনুযায়ী, \\(760 = x_A(520) + (1 - x_A)(1000)\\)। সমাধান করলে \\(x_A = 0.5\\) অর্থাৎ শতকরা 50%।`},
  {q:`\\(25^{\\circ}\\text{C}\\) এ ক্লোরোফর্ম ও ডাইক্লোরোমিথেনের বাষ্পচাপ 200 ও 41.5 mm Hg। 0.25 mol ক্লোরোফর্ম ও 0.50 mol ডাইক্লোরোমিথেন মেশালে বাষ্পীয় দশায় ক্লোরোফর্মের মোল-ভগ্নাংশ কত?`,options:[`0.45`,`0.55`,`0.62`,`0.70`],correct:3,explanation:`ক্লোরোফর্মের মোল-ভগ্নাংশ দ্রবণে = 1/3। মোট চাপ P = (1/3)×200 + (2/3)×41.5 = 94.3 mm Hg। বাষ্পীয় দশায় মোল-ভগ্নাংশ = (1/3 × 200) / 94.3 = 0.70।`},
  {q:`45 g 2-প্রোপানলের সঙ্গে কত গ্রাম 1-প্রোপানল মিশ্রিত করলে উৎপন্ন দ্রবণের মোট বাষ্পচাপ হবে 39.12 torr? (বিশুদ্ধ 1-প্রোপানল ও 2-প্রোপানলের বাষ্পচাপ 20.9 ও 45.2 torr)`,options:[`12.8 g`,`15.0 g`,`16.4 g`,`18.2 g`],correct:1,explanation:`\\(39.12 = x_1(20.9) + x_2(45.2)\\) এবং \\(x_2 = 45/60 / (45/60 + W/60)\\) সমাধান করলে W = 15.0 g পাওয়া যায়।`},

  {q:`অনুদ্বায়ী দ্রাবের লঘু দ্রবণের বাষ্পচাপের আপেক্ষিক অবনমন নির্ভর করে না—`,options:[`দ্রাবকের প্রকৃতির ওপর`,`দ্রাবের প্রকৃতির ওপর`,`দ্রবণের গাঢ়ত্বের ওপর`,`উয়তার ওপর`],correct:1,explanation:`বাষ্পচাপের আপেক্ষিক অবনমন একটি কলিগেটিভ ধর্ম, যা দ্রাবের প্রকৃতির ওপর নির্ভর করে না, কেবল কণার সংখ্যার (গাঢ়ত্বের) ওপর নির্ভর করে।`},
  {q:`39.0 g বিশুদ্ধ বেঞ্জিনে একটি অনুদ্বায়ী দ্রাবের (M=128) 1.28 g দ্রবীভূত করা হল। \\(30^{\\circ}\\text{C}\\) উয়তায় বিশুদ্ধ বেঞ্জিনের বাষ্পচাপ 118 torr হলে, দ্রবণটির বাষ্পচাপ বিশুদ্ধ বেঞ্জিনের বাষ্পচাপের তুলনায়-`,options:[`1.68 torr বেশি হবে`,`1.82 torr কম হবে`,`2.31 torr কম হবে`,`2.61 torr বেশি হবে`],correct:2,explanation:`বাষ্পচাপের অবনমন \\(\\Delta p = p^0 \\times x_2 = 118 \\times \\frac{0.01}{0.51} = 2.31 \\text{ torr}\\)। অর্থাৎ 2.31 torr কম হবে।`},
  {q:`স্থির উন্নতায় জলের বাষ্পচাপ 17.5 torr। ওই উয়তায় 90g জলে কত গ্রাম \\(C_6H_{14}O_6\\) মেশালে দ্রবণের বাষ্পচাপের অবনমন হবে 0.07 torr?`,options:[`2.84 g`,`3.18 g`,`3.64 g`,`3.72 g`],correct:3,explanation:`\\(\\Delta p / p^0 = n_2 / n_1 \\Rightarrow 0.07 / 17.5 = (W/182) / (90/18)\\)। সমাধান করলে W = 3.72 g।`},
  {q:`নীচের তরল-জোড়গুলির মধ্যে কোল্টির মিশ্র দ্রবণ রাউল্ট সূত্র থেকে ধনাত্মক বিচ্যুতি প্রদর্শন করবে?`,options:[`n-বিউটাইল ক্লোরাইড/n-বিউটাইল ব্রোমাইড`,`কার্বন ডাইসালফাইড/অ্যাসিটোন`,`ক্লোরোফর্ম/ডাইমিথাইল ইথার`,`n-হেক্সেন/সাইক্লোহেক্সেন`],correct:1,explanation:`\\(CS_2\\) ও অ্যাসিটোনের মিশ্রণে অসদৃশ অণুগুলির মধ্যকার আন্তঃক্রিয়া সদৃশ অণুগুলির থেকে দুর্বল হয়, তাই এরা ধনাত্মক বিচ্যুতি দেখায়।`},
  {q:`সর্বনিম্ন স্ফুটনাঙ্কের অ্যাজিওট্রোপিক মিশ্রণ হল-`,options:[`n-হেক্সেন/n-হেপ্টেন`,`ক্লোরোফর্ম/অ্যাসিটোন`,`বেঞ্জিন/ইথানল`,`জল/ফর্মিক অ্যাসিড`],correct:2,explanation:`যে দ্রবণগুলো রাউল্ট সূত্র থেকে ধনাত্মক বিচ্যুতি দেখায় (যেমন ইথানল-জল বা বেঞ্জিন-ইথানল) তারা সর্বনিম্ন স্ফুটনাঙ্কের অ্যাজিওট্রোপ গঠন করে।`},
  {q:`দুটি বিশুদ্ধ তরল A ও B-এর সমন্বয়ে গঠিত মিশ্র দ্রবণ রাউল্ট সূত্র থেকে ধনাত্মক বিচ্যুতি প্রদর্শন করে। এধরনের দ্রবণের বৈশিষ্ট্য-সংক্রান্ত নীচের মন্তব্যগুলির মধ্যে কোন্টি সঠিক নয়?`,options:[`দ্রবণে অসদৃশ আন্তঃক্রিয়াজনিত বল দুর্বল হয়`,`বাষ্পীয় দশায় গমনের প্রবণতা আদর্শ দ্রবণ অপেক্ষা বেশি হয়`,`এধরনের দ্রবণের ক্ষেত্রে দ্রবণ-এনথ্যালপি ঋণাত্মক হয়`,`দ্রবণের বাষ্পচাপ বিশুদ্ধ A বা B-এর তুলনায় বেশি হয়`],correct:2,explanation:`ধনাত্মক বিচ্যুতির ক্ষেত্রে দ্রবণ-এনথ্যালপি ধনাত্মক (\\(\\Delta H_{mix} > 0\\)) হয়, কারণ দুর্বল বন্ধন তৈরি হতে তাপ শোষিত হয়।`},
  {q:`নীচের তরল-জোড়গুলির মধ্যে কার ক্ষেত্রে মিশ্র দ্রবণ রাউল্ট সূত্র থেকে ঋণাত্মক বিচ্যুতি প্রদর্শন করবে?`,options:[`বেঞ্জিন/অ্যাসিটিক অ্যাসিড`,`কার্বন ডাইসালফাইড/ইথাইল অ্যাসিটেট`,`পিরিডিন/ফর্মিক অ্যাসিড`,`জল/n-প্রোপাইল অ্যালকোহল`],correct:2,explanation:`পিরিডিন ও ফর্মিক অ্যাসিডের অণুগুলোর মধ্যে শক্তিশালী হাইড্রোজেন বন্ধন তৈরি হওয়ায় এরা ঋণাত্মক বিচ্যুতি দেখায়।`},
  {q:`নীচের তরল-জোড়গুলির মধ্যে কার মিশ্র দ্রবণ সর্বোচ্চ স্ফুটনাঙ্কের অ্যাজিওট্রোপিক মিশ্রণ গঠন করবে?`,options:[`সাইক্লোপেন্টেন/সাইক্লোহেক্সেন`,`HF / \\(H_2O\\)`,`n-প্রোপাইল অ্যালকোহল / \\(H_2O\\)`,`মিথানল / বেঞ্জিন`],correct:1,explanation:`যে মিশ্রণ ঋণাত্মক বিচ্যুতি দেখায় (যেমন শক্তিশালী অ্যাসিড ও জলের মিশ্রণ), তারাই সর্বোচ্চ স্ফুটনাঙ্কের অ্যাজিওট্রোপ গঠন করে।`},
  {q:`298 K উয়তায় A ও B দুটি বিশুদ্ধ তরলের বাষ্পচাপ যথাক্রমে 400 ও 600 mm Hg। মিশ্রণে B-এর মোল-ভগ্নাংশ 0.5 হলে, উৎপন্ন মিশ্রণের বাষ্পচাপ ও বাষ্পে A ও B-এর ভগ্নাংশ যথাক্রমে-`,options:[`500 mm Hg, 0.5, 0.5`,`450 mm Hg, 0.4, 0.6`,`450 mm Hg, 0.5, 0.5`,`500 mm Hg, 0.4, 0.6`],correct:3,explanation:`P = \\(0.5 \\times 400 + 0.5 \\times 600 = 500\\) mm Hg। বাষ্পীয় দশায় \\(y_A = \\frac{0.5 \\times 400}{500} = 0.4\\) এবং \\(y_B = \\frac{0.5 \\times 600}{500} = 0.6\\)।`},

  {q:`179.82 g জলে 0.6 g ইউরিয়া দ্রবীভূত করে দ্রবণ প্রস্তুত করা হলে 100°C উয়তায় উক্ত দ্রবণে জলের বাষ্পচাপ (mmHg এককে) হবে-`,options:[`750.8`,`755.6`,`756.3`,`759.2`],correct:3,explanation:`179.82 g জলের মোল সংখ্যা = 179.82/18 = 9.99 mol। 0.6 g ইউরিয়ার মোল সংখ্যা = 0.6/60 = 0.01 mol। দ্রবণে জলের মোল-ভগ্নাংশ = 9.99 / (9.99 + 0.01) = 0.999। 100°C উয়তায় বিশুদ্ধ জলের বাষ্পচাপ 760 mmHg। সুতরাং, দ্রবণের বাষ্পচাপ = 0.999 × 760 = 759.2 mmHg।`},
  {q:`12g কঠিন অনুদ্বায়ী দ্রাব 90g জলে দ্রবীভূত করা হল। 100°C উয়তায় দ্রবণের বাষ্পচাপ 750 mm Hg হলে দ্রাবটির আণবিক ভর কত?`,options:[`150`,`180`,`200`,`210`],correct:1,explanation:`100°C-এ বিশুদ্ধ জলের বাষ্পচাপ 760 mmHg। বাষ্পচাপের আপেক্ষিক অবনমন = (760 - 750)/760 = 1/76। জলের মোল = 90/18 = 5 mol। রাউল্ট সূত্রানুসারে, 1/76 = (12/M) / [5 + (12/M)]। এটি সমাধান করলে পাওয়া যায় M = 180।`},
  {q:`450 g জলে কত গ্রাম সুক্রোজ (আণব ভর=342) দ্রবীভূত করলে 90°C উয়তায় বাষ্পচাপ সম-উয়তায় বিশুদ্ধ জলের বাষ্পচাপ (524 mm Hg) অপেক্ষা 4.0 mm Hg কম হবে?`,options:[`56.4 g`,`60.2 g`,`68.4 g`,`72.5 g`],correct:2,explanation:`বাষ্পচাপের আপেক্ষিক অবনমন = 4.0 / 524। জলের মোল = 450/18 = 25 mol। সূত্রানুযায়ী: 4/524 = n₂ / (25 + n₂)। সমাধান করলে n₂ ≈ 0.2 mol পাওয়া যায়। সুক্রোজের ভর = 0.2 × 342 = 68.4 g।`},
  {q:`100 g \\(CCl_4\\)-এ 3 g দ্রাব দ্রবীভূত করলে দ্রবণের স্ফুটনাঙ্কের উন্নয়ন বিশুদ্ধ \\(CCl_4\\)-এর থেকে 0.59 K বেশি হয়। দ্রাবের আণবিক ভর কত? (দেওয়া আছে, \\(k_b\\) = 4.95 K kg mol⁻¹)`,options:[`220.5`,`246.2`,`251.7`,`258.6`],correct:2,explanation:`মোলালিটি (m) = (3/M) / 0.1 = 30/M mol/kg। \\(\\Delta T_b = k_b \\times m\\) সমীকরণ থেকে পাই, 0.59 = 4.95 × (30/M)। সুতরাং M = (4.95 × 30) / 0.59 = 251.7।`},
  {q:`40 g বেঞ্জিনে 3.24 g সালফার দ্রবীভূত করলে উৎপন্ন দ্রবণের স্ফুটনাঙ্ক বিশুদ্ধ বেঞ্জিনের তুলনায় 0.81 K বেশি হয়। বেঞ্জিনের \\(k_b\\) = 2.53 K kg mol⁻¹ হলে দ্রবীভূত সালফারের প্রতি অণুতে পরমাণুর সংখ্যা কত? (S=32)`,options:[`2`,`4`,`6`,`8`],correct:3,explanation:`মোলালিটি m = (3.24 / M) / 0.04 = 81/M mol/kg। \\(\\Delta T_b = k_b \\times m \\Rightarrow 0.81 = 2.53 \\times (81/M) \\Rightarrow M \\approx 253\\)। সালফারের পারমাণবিক ভর 32 হওয়ায়, পরমাণুর সংখ্যা n = 253 / 32 ≈ 8। অর্থাৎ অণুটি \\(S_8\\) আকারে থাকে।`},
  {q:`অনুদ্বায়ী, তড়িৎ-অবিশ্লেষ্য একটি দ্রাবের 148.02 g জলীয় দ্রবণে দ্রাবটির 4.02 g দ্রবীভূত আছে। 100°C উয়তায় বাষ্পচাপের আপেক্ষিক অবনমন \\(3.75 \\times 10^{-3}\\) হলে দ্রবণের স্বাভাবিক স্ফুটনাঙ্ক কত? (জলের \\(k_b\\)=0.52)`,options:[`100.06°C`,`100.10°C`,`101.08°C`,`101.12°C`],correct:1,explanation:`জলের ভর = 144 g (8 mol)। বাষ্পচাপের আপেক্ষিক অবনমন = দ্রাবের মোল-ভগ্নাংশ = \\(3.75 \\times 10^{-3}\\)। \\(\\frac{n_2}{8} = 3.75 \\times 10^{-3} \\Rightarrow n_2 = 0.03\\) mol। মোলালিটি = 0.03 / 0.144 = 0.208 m। \\(\\Delta T_b = 0.52 \\times 0.208 \\approx 0.1\\) K। তাই স্ফুটনাঙ্ক = 100.10°C।`},
  {q:`52 g \\(CCl_4\\)-এ 0.512 g ন্যাপথালিন (M=128) দ্রবীভূত করলে স্ফুটনাঙ্ক 0.38 K বাড়ে। একই পরিমাণ \\(CCl_4\\)-এ একটি অজানা দ্রাবের 0.3172 g দ্রবীভূত করলে স্ফুটনাঙ্ক 0.25 K বাড়ে। অজানা দ্রাবের আণবিক ভর কত?`,options:[`116.5`,`120.4`,`124.3`,`126.8`],correct:1,explanation:`ন্যাপথালিনের ক্ষেত্রে m = (0.512/128) / 0.052 = 0.077 m. \\(k_b\\) = 0.38 / 0.077 = 4.935। অজানা দ্রাবের ক্ষেত্রে m = 0.25 / 4.935 = 0.0506 m। 0.0506 = (0.3172/M) / 0.052। সমাধান করলে M = 120.4 পাওয়া যায়।`},
  {q:`75 g বেঞ্জিনে 0.89 g দ্রাব (M=178) দ্রবীভূত করলে স্ফুটনাঙ্কের উন্নয়ন 0.17°C হয়। বেঞ্জিনের ইবিউলিওস্কোপিক ধ্রুবক (\\(k_b\\)) কত?`,options:[`2.12`,`2.53`,`2.65`,`2.80`],correct:1,explanation:`মোলালিটি m = (0.89/178) / 0.075 = 0.0667 m। \\(\\Delta T_b = k_b \\times m\\) সমীকরণ অনুযায়ী, 0.17 = \\(k_b\\) × 0.0667। সুতরাং, \\(k_b\\) = 2.53 K kg mol⁻¹।`},
  {q:`100 g জলে কত গ্রাম গ্লুকোজ (M=180) দ্রবীভূত করলে উৎপন্ন দ্রবণের স্ফুটনাঙ্ক 100.01°C হবে? (\\(k_b\\)=0.5 K kg mol⁻¹)`,options:[`0.09 g`,`0.18 g`,`0.36 g`,`0.72 g`],correct:2,explanation:`\\(\\Delta T_b\\) = 100.01 - 100 = 0.01 K। m = 0.01 / 0.5 = 0.02 mol/kg। 100 g (0.1 kg) জলে গ্লুকোজ প্রয়োজন = 0.02 × 0.1 = 0.002 mol। ভর = 0.002 × 180 = 0.36 g।`},
  {q:`অনুদ্বায়ী দ্রাবের লঘু দ্রবণের বাষ্পচাপের আপেক্ষিক অবনমন নির্ভর করে না—`,options:[`দ্রাবকের প্রকৃতির ওপর`,`দ্রাবের প্রকৃতির ওপর`,`দ্রবণে উপস্থিত দ্রাবের মোল-ভগ্নাংশের ওপর`,`উয়তার ওপর`],correct:1,explanation:`বাষ্পচাপের আপেক্ষিক অবনমন একটি কলিগেটিভ (সংখ্যাগত) ধর্ম। এটি দ্রাবের রাসায়নিক প্রকৃতির ওপর নির্ভর করে না, এটি কেবল দ্রবণে উপস্থিত দ্রাব কণার সংখ্যার (মোল-ভগ্নাংশ) ওপর নির্ভর করে।`},
  {q:`ইবিউলিওস্কোপিক ধ্রুবক (\\(k_b\\))-এর একক কী?`,options:[`K kg mol⁻¹`,`K g mol⁻¹`,`K mol kg⁻¹`,`K kg⁻¹ mol`],correct:0,explanation:`\\(\\Delta T_b = k_b \\times m\\) সূত্রানুযায়ী, \\(k_b = \\Delta T_b / m\\)। যেহেতু মোলালিটির একক mol/kg, তাই \\(k_b\\)-এর একক হবে K kg mol⁻¹।`},
  {q:`ইবিউলিওস্কোপিক ধ্রুবক (\\(k_b\\)) নীচের কোন্ রাশির ওপর নির্ভর করে?`,options:[`দ্রাবের প্রকৃতির ওপর`,`দ্রাবকের প্রকৃতির ওপর`,`দ্রবণের গাঢ়ত্বের ওপর`,`উপরের সবকটি`],correct:1,explanation:`\\(k_b\\) একটি দ্রাবকের বৈশিষ্ট্যসূচক রাশি, যা শুধুমাত্র দ্রাবকের প্রকৃতির ওপর নির্ভর করে (\\(k_b = \\frac{RT_b^2}{1000 l_v}\\))। এটি দ্রাবের প্রকৃতি বা দ্রবণের গাঢ়ত্বের ওপর নির্ভর করে না।`},
  {q:`100 g জলে কত গ্রাম গ্লুকোজ মেশালে স্ফুটনাঙ্কের উন্নয়ন 0.13°C হবে? (\\(k_b\\)=0.52 K kg mol⁻¹)`,options:[`3.5 g`,`3.8 g`,`4.5 g`,`5.0 g`],correct:2,explanation:`m = \\(\\Delta T_b / k_b\\) = 0.13 / 0.52 = 0.25 mol/kg। 100 g (0.1 kg) জলে গ্লুকোজ প্রয়োজন 0.025 mol। ভর = 0.025 × 180 = 4.5 g।`},
  {q:`75 g ক্লোরোফর্মে একটি জৈব যৌগের 1.5 g দ্রবীভূত করলে দ্রবণটির স্ফুটনাঙ্ক 62.1°C হয়। বিশুদ্ধ ক্লোরোফর্মের স্ফুটনাঙ্ক 61.7°C (\\(k_b\\)=3.88)। যৌগটির আণব ভর কত?`,options:[`156.8`,`168.4`,`172.6`,`194.0`],correct:3,explanation:`\\(\\Delta T_b\\) = 62.1 - 61.7 = 0.4°C। m = 0.4 / 3.88 = 0.103 m। মোলালিটি = (1.5/M) / 0.075 = 20/M। সুতরাং 20/M = 0.103 বা, M = 194.0।`},
  {q:`90g জল এবং 30g অনুদ্বায়ী দ্রাবের সমন্বয়ে গঠিত একটি দ্রবণের 25°C উয়তায় বাষ্পচাপ 21.85 mmHg। উক্ত দ্রবণে আরও 18g জল যোগ করলে বাষ্পচাপ হয় 22.15 mmHg। বিশুদ্ধ জলের বাষ্পচাপ কত?`,options:[`22.76`,`22.94`,`23.25`,`23.65`],correct:3,explanation:`বাষ্পচাপের আপেক্ষিক অবনমনের সূত্র প্রথম ও দ্বিতীয় দ্রবণের জন্য প্রয়োগ করে সমাধান করলে বিশুদ্ধ জলের বাষ্পচাপ \\(p^0\\) = 23.65 mm Hg পাওয়া যায়।`},

  // সেট ৫: কলিগেটিভ ধর্ম (হিমাঙ্কের অবনমন ও অভিস্রবণ চাপ)
  {q:`200 g জলে 6.2 g ইথিলিন গ্লাইকল দ্রবীভূত করে প্রাপ্ত দ্রবণের হিমাঙ্ক (°C-এ) হল (জলের \\(k_f\\)=1.86 K kg mol⁻¹)-`,options:[`-0.75`,`-0.84`,`-0.93`,`-0.98`],correct:2,explanation:`ইথিলিন গ্লাইকলের (\\(C_2H_6O_2\\)) মোল সংখ্যা = 6.2/62 = 0.1 mol। মোলালিটি = 0.1 / 0.2 = 0.5 m। \\(\\Delta T_f = 1.86 \\times 0.5 = 0.93\\) K। হিমাঙ্ক = 0 - 0.93 = -0.93°C।`},
  {q:`সুক্রোজের (M=342) 4% (W/W) জলীয় দ্রবণের হিমাঙ্ক 272.92 K। গ্লুকোজের (M=180) 5% (W/W) জলীয় দ্রবণের হিমাঙ্ক কত? (বিশুদ্ধ জলের হিমাঙ্ক = 273.15 K)`,options:[`272.75 K`,`272.83 K`,`272.69 K`,`272.77 K`],correct:0,explanation:`4% সুক্রোজের মোলালিটি = (4/342) / 0.096 = 0.121 m। \\(\\Delta T_f\\) = 0.23 K। \\(k_f\\) = 0.23/0.121 = 1.89। 5% গ্লুকোজের মোলালিটি = (5/180) / 0.095 = 0.292 m। \\(\\Delta T_f = 1.89 \\times 0.292 = 0.54\\) K। হিমাঙ্ক = 273.15 - 0.54 = 272.61 K (প্রায় -0.4°C)।`},
  {q:`200 g বেঞ্জিনে 3.152 g সেলেনিয়াম দ্রবীভূত করলে হিমাঙ্কের অবনমন 0.128 K হয়। সেলেনিয়াম \\((Se)_n\\) পলিমাররূপে থাকলে n এর মান কত? (\\(k_f\\)=5.12, Se=78.8)`,options:[`2`,`5`,`6`,`8`],correct:3,explanation:`m = \\(\\Delta T_f / k_f\\) = 0.128 / 5.12 = 0.025 m। 200g দ্রাবকে দ্রাবের মোল = 0.025 × 0.2 = 0.005 mol। আণব ভর M = 3.152 / 0.005 = 630.4। n = 630.4 / 78.8 = 8।`},
  {q:`-6°C উয়তায় জলের কঠিনীভবন প্রতিরোধ করতে 4 kg জলে কত পরিমাণ ইথিলিন গ্লাইকল (M=62) যোগ করতে হবে? (\\(k_f\\)=1.86)`,options:[`680 g`,`760 g`,`800 g`,`810 g`],correct:2,explanation:`\\(\\Delta T_f\\) = 6 K। মোলালিটি m = 6 / 1.86 = 3.225 mol/kg। 4 kg জলে দ্রাবের প্রয়োজন = 3.225 × 4 = 12.9 mol। ভর = 12.9 × 62 = 800 g।`},
  {q:`50 g জলে 50 \\(cm^3\\) ইথিলিন গ্লাইকল মেশালে হিমাঙ্ক -34°C হয়। ইথিলিন গ্লাইকলের ঘনত্ব কত?`,options:[`1.09 \\(g/cm^3\\)`,`1.13 \\(g/cm^3\\)`,`1.21 \\(g/cm^3\\)`,`1.28 \\(g/cm^3\\)`],correct:1,explanation:`\\(\\Delta T_f\\) = 34 K। m = 34 / 1.86 = 18.28 mol/kg। 50g (0.05 kg) জলে গ্লাইকলের মোল = 0.914 mol। ভর = 0.914 × 62 = 56.67 g। ঘনত্ব = ভর/আয়তন = 56.67 / 50 = 1.13 \\(g/cm^3\\)।`},
  {q:`9.45 g বেঞ্জিনে একটি দ্রাবের 0.315 g মেশালে হিমাঙ্ক 2.35 K কমে। দ্রাবটির আণব ভর কত? (\\(k_f\\)=5.1)`,options:[`68.52`,`70.84`,`72.34`,`75.06`],correct:2,explanation:`m = 2.35 / 5.1 = 0.4607 mol/kg। 9.45g (0.00945 kg) বেঞ্জিনে দ্রাবের মোল = 0.00435 mol। M = 0.315 / 0.00435 = 72.34।`},
  {q:`27°C উয়তায় 1.5 g প্রোটিনের 100 mL জলীয় দ্রবণের অভিস্রবণ চাপ 22.8 mmHg। প্রোটিনটির আপেক্ষিক আণবিক ভর কত? (R=0.082)`,options:[`\\(1.23 \\times 10^4\\)`,`\\(1.78 \\times 10^4\\)`,`\\(2.36 \\times 10^4\\)`,`\\(2.80 \\times 10^4\\)`],correct:0,explanation:`\\(\\pi\\) = 22.8/760 = 0.03 atm। M = (W R T) / (\\(\\pi\\) V) = (1.5 × 0.082 × 300) / (0.03 × 0.1) = \\(1.23 \\times 10^4\\) g/mol।`},
  {q:`মানবদেহের রক্ত 37°C উয়তায় গ্লুকোজের 5.4% (W/V) জলীয় দ্রবণের সঙ্গে আইসোটোনিক। রক্তের অভিস্রবণ চাপ (atm এককে) কত?`,options:[`6.84`,`7.08`,`7.63`,`8.14`],correct:2,explanation:`গ্লুকোজের মোলার গাঢ়ত্ব C = (5.4/180) × (1000/100) = 0.3 M। \\(\\pi\\) = C R T = 0.3 × 0.0821 × 310 = 7.63 atm।`},
  {q:`37°C উয়তায় জলের সাপেক্ষে মানব রক্তের অভিস্রবণ চাপ 7.7 atm। 250 mL গ্লুকোজ দ্রবণকে আইসোটোনিক হতে হলে কত গ্রাম গ্লুকোজ লাগবে?`,options:[`12.92 g`,`13.61 g`,`14.28 g`,`14.86 g`],correct:1,explanation:`\\(\\pi\\) = C R T \\(\\Rightarrow\\) 7.7 = C × 0.0821 × 310 \\(\\Rightarrow\\) C = 0.302 M। 250 mL দ্রবণে মোল = 0.0755 mol। গ্লুকোজের ভর = 0.0755 × 180 = 13.61 g।`},
  {q:`একটি জলীয় দ্রবণের প্রতি লিটারে 9.0 g গ্লুকোজ দ্রবীভূত আছে। 27°C উয়তায় দ্রবণটির অভিস্রবণ চাপ (atm) কত?`,options:[`1.20`,`1.48`,`1.56`,`1.80`],correct:0,explanation:`গ্লুকোজের গাঢ়ত্ব C = 9/180 = 0.05 M। \\(\\pi\\) = C R T = 0.05 × 0.08 × 300 = 1.20 atm।`},
  {q:`27°C উয়তায় ইউরিয়ার একটি জলীয় দ্রবণের অভিস্রবণ চাপ 500 mmHg। দ্রবণটিকে লঘু করার পর 42°C উয়তায় এর অভিস্রবণ চাপ হয় 105 mmHg। দ্রবণটি কতগুণ লঘু করা হয়েছে?`,options:[`2 গুণ`,`3.5 গুণ`,`5 গুণ`,`5.6 গুণ`],correct:2,explanation:`500 = \\(C_1 \\times R \\times 300\\) এবং 105 = \\(C_2 \\times R \\times 315\\)। ভাগ করলে (\\(C_1 / C_2\\)) = (500 × 315) / (105 × 300) = 5। সুতরাং দ্রবণটি 5 গুণ লঘু করা হয়েছে।`},
  {q:`সমআয়তনের 1.44% (W/V) ইউরিয়া এবং 5.472% (W/V) সুক্রোজ দ্রবণ মিশ্রিত করলে 27°C এ মিশ্র দ্রবণের অভিস্রবণ চাপ কত?`,options:[`3.08 atm`,`3.25 atm`,`4.16 atm`,`4.92 atm`],correct:3,explanation:`1L মিশ্রণে ইউরিয়ার মোল = 0.12 mol এবং সুক্রোজের মোল = 0.08 mol। মোট মোল = 0.20। C = 0.20 M। \\(\\pi\\) = 0.20 × 0.0821 × 300 = 4.92 atm।`},
  {q:`প্রতি 100 \\(cm^3\\) দ্রবণে 1.73 g তড়িৎ-অবিশ্লেষ্য পদার্থ A দ্রবীভূত আছে। এই দ্রবণটি 100 \\(cm^3\\) দ্রবণে 3.42 g সুক্রোজ দ্রবীভূত আছে এমন দ্রবণের সাথে আইসোটোনিক। A-এর আণবিক গুরুত্ব কত?`,options:[`156`,`162`,`169`,`173`],correct:3,explanation:`সুক্রোজের মোলার গাঢ়ত্ব = 3.42 / 342 = 0.01 mol / 100 \\(cm^3\\)। আইসোটোনিক হওয়ায় A-এর গাঢ়ত্বও সমান। 1.73 / \\(M_A\\) = 0.01 \\(\\Rightarrow\\) \\(M_A\\) = 173।`},
  {q:`1000 g জলে 6.3 g ইউরিয়া ও 17.1 g গ্লুকোজ দ্রবীভূত করলে দ্রবণটির হিমাঙ্ক কত হবে? (জলের \\(k_f\\) = 1.85 K kg mol⁻¹)`,options:[`-0.37°C`,`-0.46°C`,`-0.52°C`,`-0.64°C`],correct:0,explanation:`ইউরিয়ার মোল = 6.3/60 = 0.105। গ্লুকোজের মোল = 17.1/180 = 0.095। মোট মোল = 0.2 mol। মোলালিটি = 0.2 m। \\(\\Delta T_f\\) = 1.85 × 0.2 = 0.37 K। হিমাঙ্ক = -0.37°C।`},
  {q:`অভিস্রবণ প্রক্রিয়ায় দ্রাবকের নিট প্রবাহ কোন্ দিক থেকে কোন্ দিকে হয়?`,options:[`গাঢ় দ্রবণ থেকে লঘু দ্রবণে`,`লঘু দ্রবণ থেকে গাঢ় দ্রবণে`,`উভয় দিকে সমানভাবে`,`কোনো প্রবাহ হয় না`],correct:1,explanation:`অর্ধভেদ্য পর্দার মাধ্যমে অভিস্রবণ প্রক্রিয়ায় দ্রাবক সর্বদা নিম্ন গাঢ়ত্বের দ্রবণ (লঘু) থেকে উচ্চ গাঢ়ত্বের দ্রবণে (গাঢ়) প্রবাহিত হয়, যাতে উভয় পার্শ্বের গাঢ়ত্ব সমান হতে পারে।`},

  // সেট ৬: সম্পূর্ণ কলিগেটিভ ধর্ম (অ্যাডভান্সড গাণিতিক সমস্যা)
  {q:`1 kg জলে 0.05 mol গ্লুকোজ দ্রবীভূত আছে। উয়তা -0.15°C করলে দ্রবণ থেকে কত গ্রাম বরফ বেরিয়ে আসবে? (\\(k_f\\)=1.86)`,options:[`325.8 g`,`340.5 g`,`365.2 g`,`380.0 g`],correct:3,explanation:`-0.15°C এ দ্রবণে তরল জলের পরিমাণ w kg হলে, মোলালিটি m = 0.05/w। \\(\\Delta T_f = k_f \\times m \\Rightarrow 0.15 = 1.86 \\times 0.05 / w \\Rightarrow\\) w = 0.62 kg = 620 g। বরফ বেরিয়ে আসবে = 1000 - 620 = 380 g।`},
  {q:`20°C উয়তায় বিশুদ্ধ জলের বাষ্পচাপ 17.5 torr। সম-উয়তায় ইউরিয়ার একটি জলীয় দ্রবণের বাষ্পচাপ 16.94 torr হলে উক্ত দ্রবণে ইউরিয়ার ওজনগত শতকরা গাঢ়ত্ব (W/W) কত?`,options:[`7.1%`,`8.37%`,`9.92%`,`10.28%`],correct:2,explanation:`বাষ্পচাপের আপেক্ষিক অবনমন \\(\\Delta p/p^0\\) = (17.5 - 16.94) / 17.5 = 0.032। অর্থাৎ মোল-ভগ্নাংশ \\(x_2\\) = 0.032। হিসাব করলে দ্রবণের 100 গ্রামে ইউরিয়ার পরিমাণ 9.92 g পাওয়া যায়।`},
  {q:`100 g ক্যামফরে একটি দ্রাব পদার্থের 1.56 g দ্রবীভূত করা হল। দ্রবণটির হিমাঙ্ক দেখা গেল 175.9°C। বিশুদ্ধ ক্যামফরের গলনাঙ্ক 179.8°C এবং \\(k_f\\)=40 K kg mol⁻¹। দ্রাবটির আণব ভর কত?`,options:[`142`,`155`,`160`,`168`],correct:2,explanation:`\\(\\Delta T_f\\) = 179.8 - 175.9 = 3.9 K। m = 3.9 / 40 = 0.0975 mol/kg। 100g দ্রাবকে 0.00975 mol। M = 1.56 / 0.00975 = 160 g/mol।`},
  {q:`750 mL 0.1 M গ্লুকোজ দ্রবণকে 250 mL 0.2 M ইউরিয়া দ্রবণের সঙ্গে মিশ্রিত করা হল। 27°C উয়তায় মিশ্র দ্রবণের অভিস্রবণ চাপ কত?`,options:[`1.8 atm`,`2.4 atm`,`3.0 atm`,`3.2 atm`],correct:2,explanation:`গ্লুকোজের মোল = 0.75 × 0.1 = 0.075। ইউরিয়ার মোল = 0.25 × 0.2 = 0.05। মোট মোল = 0.125 mol। আয়তন = 1 L। \\(\\pi\\) = C R T = 0.125 × 0.0821 × 300 = 3.07 atm \\(\\approx\\) 3.0 atm।`},
  {q:`ইনট্রাভেনাস থেরাপিতে 5.4% (W/V) ডেক্সট্রোজ দ্রবণ মানব শিরায় চালনা করা হয়। 37°C এ দ্রবণটি রক্তের সঙ্গে আইসোটোনিক। রক্তে উপাদানগুলির মোট গাঢ়ত্ব (mol/L) কত?`,options:[`0.20`,`0.24`,`0.30`,`0.36`],correct:2,explanation:`ডেক্সট্রোজের (M=180) গাঢ়ত্ব = (5.4/180) × (1000/100) = 0.30 M। আইসোটোনিক হওয়ায় রক্তে উপাদানগুলির মোট গাঢ়ত্বও 0.30 M হবে।`},
  {q:`131.8 mg ইনসুলিন 20 mL জলীয় দ্রবণে দ্রবীভূত আছে। 300 K উয়তায় দ্রবণটির অভিস্রবণ চাপ 20.6 torr হলে ইনসুলিনের আণব ভর কত? (R=62.4 L torr mol⁻¹ K⁻¹)`,options:[`\\(2.64 \\times 10^3\\)`,`\\(4.08 \\times 10^3\\)`,`\\(5.98 \\times 10^3\\)`,`\\(6.72 \\times 10^3\\)`],correct:2,explanation:`\\(\\pi\\) = C R T \\(\\Rightarrow\\) 20.6 = (131.8 × \\(10^{-3}\\) / M) / 0.020 × 62.4 × 300। সমাধান করলে M \\(\\approx\\) 5987 বা \\(5.98 \\times 10^3\\) g/mol।`},
  {q:`জলে 18 g গ্লুকোজ দ্রবীভূত করে 500 mL দ্রবণ তৈরি করা হল। 27°C উয়তায় এই দ্রবণটি ইউরিয়ার একটি জলীয় দ্রবণের সঙ্গে আইসোটোনিক। ইউরিয়া দ্রবণটির ভর-আয়তন শতকরা গাঢ়ত্ব (W/V) কত?`,options:[`0.8%`,`1.2%`,`1.5%`,`1.8%`],correct:1,explanation:`গ্লুকোজের গাঢ়ত্ব C = (18/180) / 0.5 = 0.2 M। আইসোটোনিক হওয়ায় ইউরিয়ার গাঢ়ত্বও 0.2 M। ইউরিয়ার 1L এ ভর = 0.2 × 60 = 12g। সুতরাং 100 mL এ 1.2g অর্থাৎ 1.2% (W/V)।`},
  {q:`100 g সাইক্লোহেক্সেনে 2.136 g অ্যানথ্রাসিন (\\(C_{14}H_{10}\\)) দ্রবীভূত করা হল। দ্রবণটির স্বাভাবিক স্ফুটনাঙ্ক (°C) কত? (বিশুদ্ধ সাইক্লোহেক্সেনের স্ফুটনাঙ্ক 80.7°C, \\(k_b\\)=2.8)`,options:[`80.92`,`81.04`,`81.08`,`82.03`],correct:1,explanation:`অ্যানথ্রাসিনের আণব ভর M = 178। m = (2.136/178) / 0.1 = 0.12 mol/kg। \\(\\Delta T_b\\) = 2.8 × 0.12 = 0.336 K। স্ফুটনাঙ্ক = 80.7 + 0.336 = 81.036 \\(\\approx\\) 81.04°C।`},
  {q:`250 গ্রাম জলে কত গ্রাম ইথিলিন গ্লাইকল দ্রবীভূত করলে উৎপন্ন দ্রবণের হিমাঙ্ক -6°C হবে? (জলের \\(k_f\\)=1.86)`,options:[`46 g`,`50 g`,`58 g`,`62 g`],correct:1,explanation:`\\(\\Delta T_f\\) = 6 K। m = 6 / 1.86 = 3.225 mol/kg। 250 g (0.25 kg) জলে দ্রাবের মোল = 3.225 × 0.25 = 0.806 mol। ইথিলিন গ্লাইকলের (M=62) ভর = 0.806 × 62 = 50 g।`},
  {q:`37°C উয়তায় রক্তের গড় অভিস্রবণ চাপ 7.6 atm। দ্রবণের মোলারিটি = মোলালিটি ধরে নিলে রক্তের হিমাঙ্ক কত হবে? (\\(k_f\\)=1.86, R=0.082)`,options:[`-0.47°C`,`-0.52°C`,`-0.56°C`,`-0.61°C`],correct:2,explanation:`C = \\(\\pi\\) / RT = 7.6 / (0.082 × 310) = 0.299 M \\(\\approx\\) 0.299 m। \\(\\Delta T_f\\) = 1.86 × 0.299 = 0.556 K। হিমাঙ্ক = -0.56°C।`},
  {q:`25°C উয়তায় 12.92 m দৈর্ঘ্যযুক্ত একটি গাছের শীর্ষে কোশরস পৌঁছাতে হলে কোশরসে সুগারের গাঢ়ত্ব কত হওয়া প্রয়োজন? (কোশরসের ঘনত্ব 1.0, পারদের ঘনত্ব 13.6)`,options:[`0.052 M`,`0.075 M`,`0.085 M`,`0.1 M`],correct:0,explanation:`অভিস্রবণ চাপ \\(\\pi = h\\rho g\\) = 12.92 m জলের চাপ = 12.92 / 13.6 m পারদ চাপ = 0.95 m Hg = 950 mm Hg = 1.25 atm। C = \\(\\pi\\) / RT = 1.25 / (0.0821 × 298) = 0.051 M \\(\\approx\\) 0.052 M।`},
  {q:`1.8 g অ্যাসপিরিন (M=180) জলে দ্রবীভূত করে দ্রবণের আয়তন 400 mL করা হল। 27°C উয়তায় দ্রবণটির অভিস্রবণ চাপ (kPa এককে) কত? (R=8.314 kPa L \\(K^{-1}\\) \\(mol^{-1}\\))`,options:[`62.3`,`83.1`,`124.6`,`152.5`],correct:0,explanation:`C = (1.8/180) / 0.4 = 0.025 M। \\(\\pi\\) = C R T = 0.025 × 8.314 × 300 = 62.35 kPa \\(\\approx\\) 62.3 kPa।`},
  {q:`একটি হিমাঙ্ক-রোধক দ্রবণে ইথিলিন গ্লাইকলের (\\(C_2H_6O_2\\)) গাঢ়ত্ব 31% (W/V)। দ্রবণটির ঘনত্ব 0.95 g/mL হলে হিমাঙ্ক কত? (\\(k_f\\)=1.86)`,options:[`-12.8°C`,`-13.6°C`,`-14.5°C`,`-15.0°C`],correct:2,explanation:`1L দ্রবণের ভর 950g। এতে গ্লাইকল আছে 310g। জলের ভর = 950 - 310 = 640g। গ্লাইকলের মোল = 310/62 = 5 mol। মোলালিটি m = 5 / 0.64 = 7.8125 m। \\(\\Delta T_f\\) = 1.86 × 7.8125 = 14.5 K। হিমাঙ্ক = -14.5°C।`},
  {q:`27°C উয়তায় ইউরিয়ার একটি জলীয় দ্রবণের অভিস্রবণ চাপ 4.92 atm। দ্রবণটিকে লঘু করা হল এবং উয়তা বাড়িয়ে 47°C করা হল। এর ফলে অভিস্রবণ চাপ হয় 1.312 atm। দ্রবণটিকে কত গুণ লঘু করা হয়েছিল?`,options:[`2.5`,`3.0`,`3.5`,`4.0`],correct:3,explanation:`\\(\\pi_1 = C_1 R T_1 \\Rightarrow 4.92 = C_1 \\times R \\times 300\\)। \\(\\pi_2 = C_2 R T_2 \\Rightarrow 1.312 = C_2 \\times R \\times 320\\)। সমীকরণ দুটি ভাগ করলে পাওয়া যায় \\(C_1/C_2\\) = 4.0। অর্থাৎ 4 গুণ লঘু করা হয়েছিল।`},
  {q:`একটি নির্দিষ্ট উয়তায় জলের বাষ্পচাপ 2% হ্রাস পায় যখন 100g জলে নির্দিষ্ট পরিমাণ ইউরিয়া (আণবিক ভর 60) দ্রবীভূত করা হয়। উক্ত দ্রবণের মোলালিটি (\\(mol\\cdot kg^{-1}\\)) কত?`,options:[`1.13`,`1.84`,`2.95`,`3.26`],correct:0,explanation:`বাষ্পচাপ 2% হ্রাস পেলে আপেক্ষিক অবনমন = 0.02। অর্থাৎ দ্রাবের মোল ভগ্নাংশ 0.02। \\(n_2 / (n_1 + n_2) = 0.02 \\Rightarrow n_1 = 49 n_2\\)। 100g জলে \\(n_1\\) = 5.55 mol. তাই \\(n_2\\) = 5.55 / 49 = 0.113 mol। 100 g জলে 0.113 mol থাকলে মোলালিটি = (0.113/100) × 1000 = 1.13 m।`}

let currentQuestion = 0;
let userAnswers = new Array(quizData.length).fill(null);
let quizSubmitted = false;
let timerInterval;
let seconds = 0;

const bnNums = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
function toBn(n){ 
  let str = String(n);
  return str.split('').map(d => bnNums[d] !== undefined ? bnNums[d] : d).join(''); 
}

function initQuiz(){
  buildPalette();
  renderQuestion();
  startTimer();
}

function buildPalette(){
  const palette = document.getElementById('palette');
  palette.innerHTML = '';
  for(let i=0; i<quizData.length; i++){
    const item = document.createElement('div');
    item.className = 'palette-item';
    item.textContent = toBn(i+1);
    item.onclick = () => goToQuestion(i);
    palette.appendChild(item);
  }
  updatePalette();
}

function updatePalette(){
  const items = document.querySelectorAll('.palette-item');
  items.forEach((item, i) => {
    item.classList.remove('current','answered');
    if(i === currentQuestion) item.classList.add('current');
    if(userAnswers[i] !== null) item.classList.add('answered');
  });
  document.getElementById('answeredCount').textContent = toBn(userAnswers.filter(a => a !== null).length);
  document.getElementById('remainingCount').textContent = toBn(quizData.length - userAnswers.filter(a => a !== null).length);
}

function renderQuestion(){
  const q = quizData[currentQuestion];
  document.getElementById('qNum').textContent = toBn(currentQuestion + 1);
  document.getElementById('questionText').innerHTML = `<strong>প্রশ্ন ${toBn(currentQuestion+1)}:</strong> ${q.q}`;
  
  const optionsList = document.getElementById('optionsList');
  optionsList.innerHTML = '';
  const letters = ['A','B','C','D'];
  
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    if(userAnswers[currentQuestion] === i) div.classList.add('selected');
    if(quizSubmitted){
      if(i === q.correct) div.classList.add('correct');
      else if(userAnswers[currentQuestion] === i && i !== q.correct) div.classList.add('wrong');
    }
    div.innerHTML = `<div class="option-letter">${letters[i]}</div><div class="option-text">${opt}</div>`;
    if(!quizSubmitted){
      div.onclick = () => selectOption(i);
    }
    optionsList.appendChild(div);
  });
  
  const expBox = document.getElementById('explanation');
  if(quizSubmitted){
    document.getElementById('explanationText').innerHTML = q.explanation;
    expBox.classList.add('show');
  } else {
    expBox.classList.remove('show');
  }
  
  document.getElementById('prevBtn').disabled = currentQuestion === 0;
  if(currentQuestion === quizData.length - 1){
    document.getElementById('nextBtn').style.display = 'none';
    document.getElementById('submitBtn').style.display = 'inline-flex';
  } else {
    document.getElementById('nextBtn').style.display = 'inline-flex';
    document.getElementById('submitBtn').style.display = 'none';
  }
  
  updatePalette();
  if(window.MathJax) MathJax.typesetPromise();
}

function selectOption(idx){
  if(quizSubmitted) return;
  userAnswers[currentQuestion] = idx;
  renderQuestion();
}

function nextQuestion(){
  if(currentQuestion < quizData.length - 1){
    currentQuestion++;
    renderQuestion();
  }
}

function prevQuestion(){
  if(currentQuestion > 0){
    currentQuestion--;
    renderQuestion();
  }
}

function goToQuestion(idx){
  currentQuestion = idx;
  renderQuestion();
}

function submitQuiz(){
  const unanswered = userAnswers.filter(a => a === null).length;
  if(unanswered > 0){
    if(!confirm(`আপনি ${toBn(unanswered)}টি প্রশ্নের উত্তর দেননি। তবুও Submit করবেন?`)) return;
  } else {
    if(!confirm('আপনি কি নিশ্চিত Submit করতে চান?')) return;
  }
  quizSubmitted = true;
  stopTimer();
  showResult();
}

function showResult(){
  let correct = 0, wrong = 0;
  userAnswers.forEach((ans, i) => {
    if(ans === quizData[i].correct) correct++;
    else if(ans !== null) wrong++;
  });
  
  document.getElementById('questionArea').style.display = 'none';
  document.getElementById('resultScreen').classList.add('show');
  
  document.getElementById('scoreNum').textContent = toBn(correct);
  document.getElementById('correctCount').textContent = toBn(correct);
  document.getElementById('wrongCount').textContent = toBn(wrong);
  document.getElementById('timeTaken').textContent = document.getElementById('timer').textContent.replace('⏱️ ','');
  
  const percent = (correct / quizData.length) * 100;
  let icon, title, msg;
  if(percent >= 80){ icon='🏆'; title='অসাধারণ!'; msg='আপনি চমৎকার করেছেন!'; }
  else if(percent >= 60){ icon='🎉'; title='খুব ভালো!'; msg='আপনি ভালো করেছেন, আরো অনুশীলন করুন।'; }
  else if(percent >= 40){ icon='👍'; title='ভালো চেষ্টা!'; msg='আরো একটু চেষ্টা করলেই সফল হবেন।'; }
  else { icon='💪'; title='হাল ছাড়বেন না!'; msg='নিয়মিত অনুশীলন করুন, সফলতা আসবেই।'; }
  
  document.getElementById('resultIcon').textContent = icon;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMessage').textContent = msg;
}

function reviewQuiz(){
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('questionArea').style.display = 'block';
  currentQuestion = 0;
  renderQuestion();
}

function restartQuiz(){
  if(!confirm('আপনি কি আবার শুরু করতে চান?')) return;
  currentQuestion = 0;
  userAnswers = new Array(quizData.length).fill(null);
  quizSubmitted = false;
  seconds = 0;
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('questionArea').style.display = 'block';
  renderQuestion();
  startTimer();
}

function startTimer(){
  timerInterval = setInterval(() => {
    seconds++;
    const m = Math.floor(seconds/60);
    const s = seconds%60;
    document.getElementById('timer').textContent = `⏱️ ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }, 1000);
}

function stopTimer(){
  clearInterval(timerInterval);
}

initQuiz();
</script>
</body>
</html>
